services:
  - type: web
    name: observability-monitoring-toolkit-frontend
    env: docker
    dockerfilePath: Dockerfile.frontend
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
  - type: web
    name: observability-monitoring-toolkit-backend
    env: docker
    dockerfilePath: Dockerfile.backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: app-db
          property: connectionString
  - type: pserv
    name: app-db
    env: postgres
    plan: free
